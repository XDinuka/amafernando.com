    <style>
        :root {
            --bulma-primary: #197fe6;
            --bulma-primary-h: 210deg;
            --bulma-primary-s: 80%;
            --bulma-primary-l: 50%;
            --bulma-font-family-primary: "Inter", "Lexend", sans-serif;
        }

        [data-theme="light"] {
            --bulma-background: #f6f7f8;
            --bulma-text: #111418;
        }

        [data-theme="dark"] {
            --bulma-background: #111921;
            --bulma-text: #f6f7f8;
        }

        .navbar {
            background-color: transparent !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--bulma-border);
        }

        .section {
            padding: 3rem 1.5rem;
        }

        .timeline {
            position: relative;
            padding: 2rem 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--bulma-border);
            transform: translateX(-50%);
        }

        @media screen and (max-width: 768px) {
            .timeline::before {
                left: 20px;
            }
        }

        .timeline-item {
            margin-bottom: 3rem;
            position: relative;
        }

        .timeline-marker {
            position: absolute;
            left: 50%;
            top: 1.5rem;
            width: 1rem;
            height: 1rem;
            background: var(--bulma-primary);
            border-radius: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }

        @media screen and (max-width: 768px) {
            .timeline-marker {
                left: 20px;
            }
        }

        .timeline-content .box {
            transition: transform 0.2s;
        }

        .timeline-content .box:hover {
            transform: translateY(-5px);
        }
    </style>
